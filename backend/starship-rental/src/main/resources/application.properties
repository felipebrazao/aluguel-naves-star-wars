spring.application.name=starship-rental
server.port=${SERVER_PORT:8081}

# ===== DataSource PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/star_rental}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dev123}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dev123}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

