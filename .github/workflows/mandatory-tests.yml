name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend/starship-rental }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - run: ./mvnw verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend/starship-rental-web }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/starship-rental-web/package-lock.json
      
      # Executa tudo exceto o teste E2E (ignora o Playwright)
      - run: |
          npm ci
          npm run lint
          npm run test:ci
          npm run build
