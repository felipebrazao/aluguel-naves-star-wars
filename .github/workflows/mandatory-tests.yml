name: Mandatory Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/starship-rental

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: ./mvnw verify

  frontend:
    name: Frontend unit and E2E tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/starship-rental-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/starship-rental-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend verification suite
        run: npm run verify
