services:

  # ── Base de dados principal ──────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: star-rental-postgres
    environment:
      POSTGRES_DB: star_rental
      POSTGRES_USER: dev123
      POSTGRES_PASSWORD: dev123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./plano-software/set.sql:/docker-entrypoint-initdb.d/set.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev123 -d star_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/starship-rental
      dockerfile: Dockerfile
    container_name: star-rental-backend
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/star_rental
      SPRING_DATASOURCE_USERNAME: dev123
      SPRING_DATASOURCE_PASSWORD: dev123
      # Permite requisições do frontend em produção (porta 80) e dev (porta 5173)
      APP_CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend React/Vite (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/starship-rental-web
      dockerfile: Dockerfile
      args:
        # VITE_API_URL é baked-in em build time; aponta para o host pois o
        # browser acede o backend directamente (não via rede Docker interna).
        VITE_API_URL: http://localhost:8081
    container_name: star-rental-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── SonarQube (análise estática, opcional) ───────────────────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: star-rental-sonarqube
    depends_on:
      sonar-db:
        condition: service_started
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    profiles:
      - sonar

  sonar-db:
    image: postgres:16
    container_name: star-rental-sonardb
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    profiles:
      - sonar

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
